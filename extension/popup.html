<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberShield</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    width:300px;
    background:#0d1117;
    color:#f0f0f8;
    font-family:'Space Grotesk',sans-serif;
    overflow:hidden;
  }

  /* ── Header ── */
  .hdr{
    background:linear-gradient(135deg,#1a2035,#111827);
    padding:18px 18px 14px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    position:relative;
    overflow:hidden;
  }
  .hdr::before{
    content:'';position:absolute;top:-30px;right:-30px;
    width:100px;height:100px;
    background:radial-gradient(circle,rgba(255,59,59,0.15),transparent 70%);
    border-radius:50%;
  }
  .hdr-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .logo{font-size:32px;line-height:1}
  .brand{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px}
  .tagline{font-size:10px;color:#6b7280;margin-top:1px;letter-spacing:0.3px}

  /* status pill */
  .status-pill{
    display:inline-flex;align-items:center;gap:7px;
    padding:6px 12px;border-radius:20px;
    font-size:11px;font-weight:700;
    transition:all 0.3s;cursor:pointer;
    border:none;
    width:100%;justify-content:center;
  }
  .status-pill.on{background:rgba(46,204,113,0.15);color:#2ecc71;border:1px solid rgba(46,204,113,0.3)}
  .status-pill.off{background:rgba(255,59,59,0.12);color:#ff3b3b;border:1px solid rgba(255,59,59,0.25)}
  .pulse{
    width:8px;height:8px;border-radius:50%;background:#2ecc71;flex-shrink:0;
    animation:pulse 1.8s infinite;
  }
  .pulse.off-dot{background:#ff3b3b;animation:none}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(46,204,113,0.4)}50%{opacity:0.6;box-shadow:0 0 0 6px transparent}}

  /* ── Body ── */
  .body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}

  /* stat cards */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{
    background:#1a2035;border-radius:12px;padding:12px;
    border:1px solid rgba(255,255,255,0.05);
    text-align:center;
  }
  .stat-num{font-size:26px;font-weight:800;line-height:1}
  .stat-num.red{color:#ff3b3b}
  .stat-num.green{color:#2ecc71}
  .stat-label{font-size:10px;color:#6b7280;margin-top:3px;letter-spacing:0.3px}

  /* backend status */
  .be-row{
    background:#1a2035;border-radius:10px;padding:10px 14px;
    display:flex;justify-content:space-between;align-items:center;
    border:1px solid rgba(255,255,255,0.05);
    font-size:11px;
  }
  .be-label{color:#6b7280}
  #be-val{font-weight:700}

  /* sites */
  .sites-card{
    background:#1a2035;border-radius:12px;
    border:1px solid rgba(255,255,255,0.05);
    overflow:hidden;
  }
  .site-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;font-size:12px;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .site-row:last-child{border-bottom:none}
  .site-name{color:#d1d5db}
  .badge-on{
    background:rgba(46,204,113,0.15);color:#2ecc71;
    border:1px solid rgba(46,204,113,0.3);
    padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;
  }
  .badge-off{
    background:rgba(255,255,255,0.06);color:#6b7280;
    border:1px solid rgba(255,255,255,0.08);
    padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;
  }

  /* last scan */
  .last-scan{
    font-size:10px;color:#4b5563;text-align:center;padding:2px 0 4px;
  }

  /* log */
  .log-title{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.7px;padding:2px 0}
  .log-list{
    background:#1a2035;border-radius:12px;
    border:1px solid rgba(255,255,255,0.05);
    max-height:110px;overflow-y:auto;
  }
  .log-list::-webkit-scrollbar{width:3px}
  .log-list::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:3px}
  .log-item{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;
    border-bottom:1px solid rgba(255,255,255,0.03);
    font-size:10px;
  }
  .log-item:last-child{border-bottom:none}
  .log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .log-txt{color:#9ca3af;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .log-time{color:#4b5563;flex-shrink:0}
  .log-empty{padding:14px;text-align:center;font-size:11px;color:#4b5563}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div class="logo">🛡️</div>
    <div>
      <div class="brand">CyberShield</div>
      <div class="tagline">SCAM DETECTOR · ALWAYS WATCHING</div>
    </div>
  </div>
  <button class="status-pill on" id="toggleBtn">
    <div class="pulse" id="pulseDot"></div>
    <span id="statusTxt">Active — Click to Pause</span>
  </button>
</div>

<div class="body">

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num red" id="scamCount">0</div>
      <div class="stat-label">SCAMS DETECTED</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="scanCount">0</div>
      <div class="stat-label">SCANS DONE</div>
    </div>
  </div>

  <div class="sites-card">
    <div class="site-row">
      <span class="site-name">📱 WhatsApp Web</span>
      <span class="badge-on" id="waBadge">ACTIVE</span>
    </div>
    <div class="site-row">
      <span class="site-name">📧 Gmail</span>
      <span class="badge-on" id="gmBadge">ACTIVE</span>
    </div>
  </div>

  <div class="be-row">
    <span class="be-label">🤖 ML Backend</span>
    <span id="be-val" style="color:#6b7280">Checking…</span>
  </div>

  <div class="last-scan" id="lastScan">Last scan: —</div>

  <div class="log-title">Recent Detections</div>
  <div class="log-list" id="logList">
    <div class="log-empty">No scams detected yet ✅</div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
